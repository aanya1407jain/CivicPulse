name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # Updated to v4 to support Node.js 24
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Set up git identity (required to avoid 'exit code 1' on some runners)
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 2. Add the Hugging Face Space as a remote and push
          # Replace YOUR_USERNAME and YOUR_SPACE_NAME below
          git push --force https://Aanya1407:$HF_TOKEN@huggingface.co/spaces/Aanya1407/CivicPulse main
