[pytest]
testpaths = tests
addopts =
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-fail-under=75
    --cov-omit=tests/*,*/__init__.py

[coverage:run]
omit =
    tests/*
    */__init__.py
    .streamlit/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    @abstractmethod
